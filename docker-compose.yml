version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: bash -c "pip install -q 'numpy==1.26.4' && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - chroma_data:/app/chroma_data
      - uploads_data:/app/uploads
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - postgres
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - INTERNAL_API_URL=http://backend:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/next.config.js:/app/next.config.js
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: legalai
      POSTGRES_PASSWORD: legalai_password
      POSTGRES_DB: legal_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
  uploads_data:
  hf_cache:
